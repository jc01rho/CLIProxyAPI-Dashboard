name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  COLLECTOR_IMAGE: cliproxy-collector
  FRONTEND_IMAGE: cliproxy-dashboard

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      packages: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Detect changed paths
      id: changes
      uses: dorny/paths-filter@v3
      with:
        filters: |
          collector_image:
            - 'collector/**'
            - 'init-db/**'
            - '.env.example'
            - 'docker-compose.yml'
            - 'docker-compose.override.yml'
            - '.github/workflows/docker-image.yml'
          frontend_image:
            - 'frontend/**'
            - '.env.example'
            - 'docker-compose.yml'
            - 'docker-compose.override.yml'
            - '.github/workflows/docker-image.yml'

    - name: Extract metadata for Collector
      if: steps.changes.outputs.collector_image == 'true'
      id: meta-collector
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.COLLECTOR_IMAGE }}
        tags: |
          type=raw,value=latest,enable={{is_default_branch}}
          type=sha,prefix=

    - name: Extract metadata for Frontend
      if: steps.changes.outputs.frontend_image == 'true'
      id: meta-frontend
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.FRONTEND_IMAGE }}
        tags: |
          type=raw,value=latest,enable={{is_default_branch}}
          type=sha,prefix=

    - name: Build and push Collector image
      if: steps.changes.outputs.collector_image == 'true'
      uses: docker/build-push-action@v6
      with:
        context: ./collector
        file: ./collector/Dockerfile
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta-collector.outputs.tags }}
        labels: ${{ steps.meta-collector.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push Frontend image
      if: steps.changes.outputs.frontend_image == 'true'
      uses: docker/build-push-action@v6
      with:
        context: ./frontend
        file: ./frontend/Dockerfile
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta-frontend.outputs.tags }}
        labels: ${{ steps.meta-frontend.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

