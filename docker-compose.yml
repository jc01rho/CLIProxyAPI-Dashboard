services:
  postgres:
    image: postgres:16-alpine
    container_name: cliproxy-postgres
    environment:
      - POSTGRES_USER=cliproxy
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=cliproxy
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cliproxy -d cliproxy"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - cliproxy-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  postgrest:
    image: postgrest/postgrest:v12.2.3
    container_name: cliproxy-postgrest
    environment:
      - PGRST_DB_URI=postgres://cliproxy:${DB_PASSWORD}@postgres:5432/cliproxy
      - PGRST_DB_ANON_ROLE=web_anon
      - PGRST_DB_SCHEMA=public
      - PGRST_LOG_LEVEL=warn
      - PGRST_SERVER_PORT=3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - cliproxy-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  collector:
    image: ghcr.io/leolionart/cliproxy-collector:latest
    container_name: cliproxy-collector
    environment:
      - DATABASE_URL=postgres://cliproxy:${DB_PASSWORD}@postgres:5432/cliproxy
      - CLIPROXY_URL=${CLIPROXY_URL:-http://host.docker.internal:8317}
      - CLIPROXY_MANAGEMENT_KEY=${CLIPROXY_MANAGEMENT_KEY}
      - COLLECTOR_INTERVAL_SECONDS=${COLLECTOR_INTERVAL_SECONDS:-300}
      - COLLECTOR_TRIGGER_PORT=5001
      - TIMEZONE_OFFSET_HOURS=${TIMEZONE_OFFSET_HOURS:-7}
    expose:
      - "5001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/api/collector/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
      postgrest:
        condition: service_started
    restart: unless-stopped
    networks:
      - cliproxy-network
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    image: ghcr.io/leolionart/cliproxy-dashboard:latest
    container_name: cliproxy-dashboard
    ports:
      - "8417:80"
    depends_on:
      collector:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - cliproxy-network
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  cliproxy-network:
    driver: bridge

volumes:
  postgres_data:
